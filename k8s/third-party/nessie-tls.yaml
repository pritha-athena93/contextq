---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nessie-root-ca
  namespace: nessie-ns
spec:
  isCA: true
  commonName: nessie-root-ca
  secretName: nessie-root-ca
  duration: 87600h    # 10 years
  renewBefore: 720h   # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ray"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ray"
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: nessie-ca
  namespace: nessie-ns
spec:
  ca:
    secretName: nessie-root-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nessie-tls
  namespace: nessie-ns
spec:
  commonName: nessie.nessie-ns
  dnsNames:
    - nessie
    - nessie.nessie-ns
    - nessie.nessie-ns.svc
    - nessie.nessie-ns.svc.cluster.local
  secretName: nessie-tls-secret
  duration: 8760h     # 1 year
  renewBefore: 720h   # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: nessie-ca
    kind: Issuer
    group: cert-manager.io
